<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Clasificación Automática de Tickets</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="container">
        <header class="hero">
            <div>
                <p class="eyebrow">Mesa de Ayuda · IA</p>
                <h1>Clasificador Naive Bayes de Solicitudes</h1>
                <p class="subtitle">Ingresa los detalles del ticket y deja que el modelo determine el área correspondiente.</p>
            </div>
            <div class="status-chip">Modelo listo ✓</div>
        </header>

        <section class="card">
            <form id="ticketForm" novalidate>
                <div class="form-row">
                    <div class="form-group">
                        <label for="ticketId">ID del Ticket</label>
                        <div class="id-row">
                            <input type="text" id="ticketId" name="ticket_id" readonly>
                            <button type="button" id="refreshId" class="ghost">Nuevo ID</button>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="subject">Asunto</label>
                        <input type="text" id="subject" name="subject" placeholder="Ej. Problemas para acceder a mi cuenta">
                    </div>
                </div>

                <div class="form-group">
                    <label for="description">Descripción</label>
                    <textarea id="description" name="description" rows="6" placeholder="Describe el ticket con la mayor cantidad de detalles posible..."></textarea>
                </div>

                <div id="alertBox" class="alert hidden"></div>

                <div class="form-actions">
                    <button type="submit" class="primary" id="submitBtn">Clasificar ticket</button>
                </div>
            </form>
        </section>

        <section id="resultSection" class="card hidden">
            <h2>Resultado</h2>
            <p id="resultCategory" class="result-category"></p>
            <p id="resultDetails" class="result-details"></p>
        </section>
    </main>

    <script defer src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
